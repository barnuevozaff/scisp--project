name: SCISP CI

# Runs automatically on every push and pull request targeting main.
# Backend and frontend are checked independently so a failure in one
# doesn't hide a failure in the other.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — install & syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check all source files
        run: |
          find src database -name "*.js" -print0 | xargs -0 -n1 node --check

  frontend:
    name: Frontend — install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          # A placeholder API URL is enough to verify the build succeeds;
          # the real value is supplied by Vercel at deploy time.
          VITE_API_URL: https://example-placeholder.invalid/api
