# docker-compose.yml
# Spins up the full SCISP stack locally: MySQL, the backend API, and the
# frontend (served via nginx). This is for local development/demo only —
# the graded deployment runs on Vercel + Railway as required by the
# project guidelines.
#
# Usage:
#   docker compose up --build
#   Frontend:  http://localhost:8080
#   Backend:   http://localhost:5000/api/health
version: '3.9'

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: scisp_db
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: scisp_db
      JWT_SECRET: local-docker-dev-secret-change-me
      JWT_EXPIRES_IN: 8h
      CLIENT_URL: http://localhost:8080
    ports:
      - '5000:5000'
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  mysql_data:
  backend_uploads:
